<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protokol - Görev Yönetimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandOrange: '#FF6B00',
                        brandYellow: '#FFD600',
                    }
                }
            }
        }
    </script>
    <!-- Dinamik Layout Yükleyici -->
    <script src="./js/layout.js" defer></script>
    <!-- Görev Mantığı ve Firebase Bağlantısı -->
    <script type="module" src="./js/gorevler.js" defer></script>
</head>

<body class="bg-neutral-950 text-white min-h-screen flex justify-center font-sans">

    <!-- Ana İçerik Alanı (Dikey sarmalayıcı düzene geçildi) -->
    <main class="flex-1 p-6 md:p-8 overflow-y-auto bg-neutral-900 flex flex-col gap-6 w-full max-w-full">
        
        <!-- Görev Tanımlama Formu (Geniş ekranlarda yatay düzene sahip, sadece Yöneticilere açık) -->
        <div id="gorev-form-container" class="w-full bg-black border border-neutral-900 rounded-xl p-5 shadow-sm hidden">
            <div class="mb-4">
                <h2 class="text-lg font-bold text-white tracking-wide" id="form-title">Yeni Görev Tanımla</h2>
                <p class="text-xs text-neutral-500 mt-0.5" id="form-desc">Lütfen yeni görevin bilgilerini girin ve atanacak personeli seçin.</p>
            </div>

            <form id="gorev-form" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-12 gap-4 items-end">
                <!-- Görev Başlığı -->
                <div class="xl:col-span-3">
                    <label for="gorev-baslik" class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Görev Başlığı</label>
                    <input type="text" id="gorev-baslik" required placeholder="Örn: Cihaz Kalibrasyonu" class="w-full bg-neutral-900 border border-neutral-850 rounded py-2 px-3 text-xs text-white placeholder-neutral-600 focus:outline-none focus:border-brandOrange transition-colors">
                </div>

                <!-- Görev Açıklaması -->
                <div class="xl:col-span-4">
                    <label for="gorev-aciklama" class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Görev Açıklaması</label>
                    <input type="text" id="gorev-aciklama" required placeholder="Detayları ve açıklama notlarını girin..." class="w-full bg-neutral-900 border border-neutral-850 rounded py-2 px-3 text-xs text-white placeholder-neutral-600 focus:outline-none focus:border-brandOrange transition-colors">
                </div>

                <!-- Öncelik Derecesi -->
                <div class="xl:col-span-2">
                    <label for="gorev-oncelik" class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Öncelik</label>
                    <div class="relative">
                        <select id="gorev-oncelik" required class="w-full bg-neutral-900 border border-neutral-850 rounded py-2 px-3 text-xs text-white focus:outline-none focus:border-brandOrange transition-colors appearance-none cursor-pointer">
                            <option value="dusuk" class="bg-neutral-950">Düşük</option>
                            <option value="orta" class="bg-neutral-950" selected>Orta</option>
                            <option value="yuksek" class="bg-neutral-950">Yüksek</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-neutral-550">
                            <svg class="fill-current h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Atanacak Personel -->
                <div class="xl:col-span-2">
                    <label for="atanan-personel" class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Atanacak Personel</label>
                    <div class="relative">
                        <select id="atanan-personel" required class="w-full bg-neutral-900 border border-neutral-850 rounded py-2 px-3 text-xs text-white focus:outline-none focus:border-brandOrange transition-colors appearance-none cursor-pointer">
                            <option value="" class="bg-neutral-950" disabled selected>Personel seçin</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-neutral-550">
                            <svg class="fill-current h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Gönder Butonu -->
                <div class="xl:col-span-1">
                    <button type="submit" class="w-full bg-brandOrange hover:bg-orange-600 text-white font-bold py-2 px-3 rounded text-xs transition-colors cursor-pointer flex items-center justify-center space-x-1 uppercase tracking-wider">
                        <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>Ata</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Görev Listesi Alanı (Masaüstünde her sırada net 2 kolon gösterecek şekilde yapılandırıldı) -->
        <div class="w-full space-y-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight">Görev Listesi</h1>
                    <p class="text-xs text-neutral-500 mt-0.5">Sistemdeki aktif ve geçmiş görevlerin takibi.</p>
                </div>
                <span id="gorev-count" class="bg-neutral-900 border border-neutral-850 text-neutral-400 text-xs font-bold px-3 py-1 rounded-full hidden">
                    0 Görev
                </span>
            </div>

            <!-- Kart Izgarası (lg:grid-cols-2 yapılarak her sırada 2 tane olması sağlandı) -->
            <div id="gorev-list" class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start w-full"></div>
        </div>
    </main>

</body>

</html>
