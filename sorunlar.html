<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protokol - Sorun Bildirimleri</title>
    <!-- PWA ve Mobil Uyumluluk Meta Etiketleri -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#FF6B00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./assets/icons/icon-192x192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandOrange: '#FF6B00',
                        brandYellow: '#FFD600',
                    }
                }
            }
        }
    </script>
    <!-- Dinamik Layout Yükleyici -->
    <script src="./js/layout.js" defer></script>
    <!-- Sorun Entegrasyonu ve Firebase -->
    <script type="module" src="./js/sorunlar.js" defer></script>
</head>

<body class="bg-neutral-950 text-white min-h-screen flex justify-center font-sans">

    <!-- Ana İçerik Alanı -->
    <main class="flex-1 p-6 md:p-8 overflow-y-auto bg-neutral-900 flex flex-col gap-6 w-full max-w-full">

        <!-- Sorun Bildirme Formu (Sadece Personellere gösterilecek, js/sorunlar.js ile kontrol edilecek) -->
        <div id="sorun-form-container"
            class="w-full bg-black border border-neutral-900 rounded-xl p-5 shadow-sm hidden">
            <div class="mb-4">
                <h2 class="text-lg font-bold text-white tracking-wide" id="form-title">Yeni Sorun Bildir</h2>
                <p class="text-xs text-neutral-500 mt-0.5" id="form-desc">Lütfen karşılaştığınız sorunun/hatanın
                    detaylarını girerek yöneticiye bildirin.</p>
            </div>

            <form id="sorun-form" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-12 gap-4 items-end" autocomplete="off">
                <!-- Sorun Başlığı (Col span 3) -->
                <div class="xl:col-span-3">
                    <label for="sorun-baslik"
                        class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Sorun
                        Başlığı</label>
                    <input type="text" id="sorun-baslik" required placeholder="Örn: CNC Cihazı Çalışmıyor"
                        class="w-full bg-neutral-900 border border-neutral-850 rounded py-2 px-3 text-xs text-white placeholder-neutral-600 focus:outline-none focus:border-brandOrange transition-colors">
                </div>

                <!-- Sorun Açıklaması (Col span 4) -->
                <div class="xl:col-span-4">
                    <label for="sorun-aciklama"
                        class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Detaylı
                        Açıklama</label>
                    <input type="text" id="sorun-aciklama" required
                        placeholder="Hata kodunu ve cihaz durumunu açıklayın..."
                        class="w-full bg-neutral-900 border border-neutral-850 rounded py-2 px-3 text-xs text-white placeholder-neutral-600 focus:outline-none focus:border-brandOrange transition-colors">
                </div>

                <!-- Öncelik Derecesi (Col span 2) -->
                <div class="xl:col-span-2">
                    <label for="sorun-oncelik"
                        class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Öncelik</label>
                    <div class="relative">
                        <select id="sorun-oncelik" required
                            class="w-full bg-neutral-900 border border-neutral-850 rounded py-2 px-3 text-xs text-white focus:outline-none focus:border-brandOrange transition-colors appearance-none cursor-pointer">
                            <option value="dusuk" class="bg-neutral-950">Düşük</option>
                            <option value="orta" class="bg-neutral-950" selected>Orta</option>
                            <option value="yuksek" class="bg-neutral-950">Yüksek</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-neutral-550">
                            <svg class="fill-current h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 20 20">
                                <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Dosya Ekle (Col span 2) -->
                <div class="xl:col-span-2">
                    <label for="sorun-dosya" class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Dosya / Medya (Ek)</label>
                    <input type="file" id="sorun-dosya" class="w-full bg-neutral-900 border border-neutral-850 rounded py-1.5 px-2 text-[10px] text-neutral-400 file:mr-2 file:py-0.5 file:px-1.5 file:rounded file:border-0 file:text-[9px] file:font-semibold file:bg-neutral-800 file:text-white hover:file:bg-neutral-700 cursor-pointer focus:outline-none focus:border-brandOrange transition-colors">
                </div>

                <!-- Gönder Butonu (Col span 1) -->
                <div class="xl:col-span-1">
                    <button type="submit"
                        class="w-full bg-brandOrange hover:bg-orange-600 text-white font-bold py-2 px-3 rounded text-xs transition-colors cursor-pointer flex items-center justify-center space-x-1.5 uppercase tracking-wider">
                        <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <span>Bildir</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Sorun Bildirim Listesi -->
        <div class="w-full space-y-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight">Sorun Bildirimleri</h1>
                    <p class="text-xs text-neutral-500 mt-0.5">Personeller tarafından bildirilen sorunların durum
                        takibi.</p>
                </div>
                <span id="sorun-count"
                    class="bg-neutral-900 border border-neutral-850 text-neutral-400 text-xs font-bold px-3 py-1 rounded-full hidden">
                    0 Sorun
                </span>
            </div>

            <!-- Kart Izgarası (2 Kolonlu yapı) -->
            <div id="sorun-list" class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start w-full"></div>
        </div>
    </main>

</body>

</html>
